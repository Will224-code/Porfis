<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Quieres ser nuestra coach? 🖤💜</title>

  <!-- Google Fonts: Luckiest Guy (display) + Varela Round (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Varela+Round&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       CSS VARIABLES — PALETA KUROMI
    ============================================= */
    :root {
      --black:       #000000;
      --white:       #FFFFFF;
      --pink:        #FF69B4;
      --pink-light:  #eea1e3;
      --purple:      #9370DB;
      --purple-dark: #514283;
      --dark-bg:     #0d0010;
      --gray-dark:   #363232;
      --glow-pink:   0 0 18px #FF69B4, 0 0 40px #eea1e360;
      --glow-purple: 0 0 18px #9370DB, 0 0 40px #51428360;
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'Varela Round', sans-serif;
      background: var(--dark-bg);
      color: var(--white);
      overflow-x: hidden;
    }

    /* =============================================
       FONDO GRADIENTE ANIMADO
    ============================================= */
    body {
      background: radial-gradient(ellipse at 60% 0%, #2a0050 0%, #0d0010 55%, #000 100%);
      background-attachment: fixed;
    }

    /* Ruido / textura sutil */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================
       PARTÍCULAS FLOTANTES (estrellas / corazones)
    ============================================= */
    .particles {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      font-size: 1rem;
      opacity: 0;
      animation: floatUp var(--dur, 8s) var(--delay, 0s) ease-in infinite;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg) scale(0.5); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    /* =============================================
       CEREZAS DECORATIVAS — ESQUINAS
    ============================================= */
    .corner-decoration {
      position: fixed;
      z-index: 10;
      width: 90px; height: 90px;
      display: flex; align-items: center; justify-content: center;
      animation: cherryFloat 3.5s ease-in-out infinite;
      will-change: transform;
      filter: drop-shadow(0 0 8px var(--pink));
    }
    .corner-decoration.top-left  { top: 12px; left: 12px; }
    .corner-decoration.top-right { top: 12px; right: 12px; animation-delay: -1.2s; }
    .corner-decoration.bot-left  { bottom: 12px; left: 12px; animation-delay: -0.6s; }
    .corner-decoration.bot-right { bottom: 12px; right: 12px; animation-delay: -1.8s; }

    /* Si no hay imagen, mostramos emoji de cereza + calavera */
    .corner-decoration .cherry-emoji {
      font-size: 2.4rem;
      line-height: 1;
      text-align: center;
      user-select: none;
    }
    .corner-decoration img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    @keyframes cherryFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-12px) rotate(5deg); }
    }

    /* =============================================
       LAYOUT PRINCIPAL
    ============================================= */
    #app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 3rem;
      gap: 1.6rem;
    }

    /* =============================================
       IMAGEN KUROMI
    ============================================= */
    .kuromi-img-wrapper {
      width: 180px; height: 180px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: var(--glow-purple), 0 0 0 4px #000;
      animation: kuromiBounce 2.2s ease-in-out infinite;
      will-change: transform;
    }

    .kuromi-img-wrapper img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--gray-dark);        /* placeholder si no hay imagen */
      display: block;
    }

    /* Placeholder visual cuando no carga la imagen */
    .kuromi-placeholder {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a0030, #2d0050);
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
    }

    @keyframes kuromiBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-10px) scale(1.04); }
    }

    /* =============================================
       BADGE "ICPC"
    ============================================= */
    .badge {
      background: var(--black);
      border: 2px solid var(--purple);
      border-radius: 999px;
      padding: 0.3rem 1.2rem;
      font-family: 'Varela Round', sans-serif;
      font-size: 0.85rem;
      color: var(--pink-light);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      box-shadow: var(--glow-purple);
    }

    /* =============================================
       TÍTULO PRINCIPAL
    ============================================= */
    .main-title {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(1.8rem, 6vw, 3.4rem);
      text-align: center;
      line-height: 1.15;
      letter-spacing: 0.03em;
      /* Efecto degradado en texto */
      background: linear-gradient(135deg, var(--white) 30%, var(--pink-light) 70%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      /* Sombra "stroke" oscuro */
      filter: drop-shadow(2px 3px 0 #000) drop-shadow(0 0 16px #9370DB88);
      max-width: 700px;
    }

    /* =============================================
       SUBTÍTULO / COUNTER DE NOES
    ============================================= */
    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: var(--pink-light);
      text-align: center;
      max-width: 520px;
      opacity: 0.85;
    }

    #no-counter-msg {
      min-height: 1.5em;
      transition: opacity 0.3s;
    }

    /* =============================================
       BOTONES
    ============================================= */
    .buttons-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      letter-spacing: 0.05em;
      padding: 0.75em 2em;
      border: 3px solid var(--black);
      border-radius: 50px;
      cursor: pointer;
      outline: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
      will-change: transform;
      position: relative;
      overflow: hidden;
      user-select: none;
      white-space: nowrap;
    }

    /* Brillo animado en hover */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }
    .btn:hover:not(:disabled)::after { transform: translateX(100%); }

    /* Botón SÍ */
    #btn-yes {
      background: linear-gradient(135deg, #b03db0, var(--purple));
      color: var(--white);
      box-shadow: 0 6px 0 #2d0050, var(--glow-purple);
      transform-origin: center;
    }
    #btn-yes:hover:not(:disabled) {
      filter: brightness(1.15);
      box-shadow: 0 8px 0 #2d0050, var(--glow-pink);
    }
    #btn-yes:active:not(:disabled) { transform: translateY(3px) !important; }

    /* Botón NO */
    #btn-no {
      background: linear-gradient(135deg, #2a2a2a, #1a0018);
      color: var(--pink-light);
      border-color: var(--purple);
      box-shadow: 0 6px 0 #000, 0 0 12px #9370DB55;
      transform-origin: center;
    }
    #btn-no:hover:not(:disabled) {
      border-color: var(--pink);
      box-shadow: 0 6px 0 #000, var(--glow-pink);
      color: var(--pink);
    }

    /* Estado desactivado */
    .btn:disabled { cursor: not-allowed; opacity: 0.4; }

    /* Shake animation (cuando crece SÍ) */
    @keyframes shakePulse {
      0%   { rotate: 0deg; }
      20%  { rotate: -4deg; }
      40%  { rotate: 4deg; }
      60%  { rotate: -3deg; }
      80%  { rotate: 2deg; }
      100% { rotate: 0deg; }
    }
    .shake { animation: shakePulse 0.45s ease; }

    /* =============================================
       PANTALLA DE VICTORIA (¡SÍ!)
    ============================================= */
    #victory-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      animation: victoryAppear 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    #victory-screen.active { display: flex; }

    @keyframes victoryAppear {
      from { opacity: 0; transform: scale(0.5) rotate(-6deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .victory-title {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(2rem, 8vw, 4.5rem);
      text-align: center;
      background: linear-gradient(135deg, var(--pink) 0%, var(--white) 50%, var(--pink-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(3px 3px 0 #000) drop-shadow(0 0 24px var(--pink));
      animation: titlePulse 1.5s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(3px 3px 0 #000) drop-shadow(0 0 20px var(--pink)); }
      50%       { filter: drop-shadow(3px 3px 0 #000) drop-shadow(0 0 45px var(--pink)); }
    }

    .victory-sub {
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: var(--pink-light);
      text-align: center;
      max-width: 480px;
    }

    /* =============================================
       CONFETI
    ============================================= */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* =============================================
       SEPARADOR DECORATIVO
    ============================================= */
    .deco-divider {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 1.1rem; opacity: 0.5;
      color: var(--purple);
      user-select: none;
    }
    .deco-divider::before,
    .deco-divider::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      width: 60px;
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      position: relative; z-index: 2;
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #555;
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 480px) {
      .btn { width: 100%; justify-content: center; }
      .buttons-wrapper { flex-direction: column; width: 100%; max-width: 320px; }
      .corner-decoration { width: 60px; height: 60px; }
      .corner-decoration .cherry-emoji { font-size: 1.7rem; }
    }

    @media (min-width: 768px) {
      #app { padding: 3rem 2rem 4rem; gap: 2rem; }
      .kuromi-img-wrapper { width: 210px; height: 210px; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      #app { flex-direction: row; flex-wrap: wrap; padding: 1rem; gap: 1rem; }
      .kuromi-img-wrapper { width: 120px; height: 120px; }
      .main-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- =============================================
       CANVAS CONFETI
  ============================================= -->
  <canvas id="confetti-canvas"></canvas>

  <!-- =============================================
       PARTÍCULAS FLOTANTES (JS las genera)
  ============================================= -->
  <div class="particles" id="particles"></div>

  <!-- =============================================
       DECORACIONES DE ESQUINAS
       Reemplaza los emojis con <img src="imagen_cerezas.png"> si tienes el archivo
  ============================================= -->
  <div class="corner-decoration top-left" title="Cerezas Kuromi">
    <!-- <img src="imagen_cerezas.png" alt="cerezas kuromi"> -->
    <span class="cherry-emoji">🍒💀</span>
  </div>
  <div class="corner-decoration top-right">
    <span class="cherry-emoji">💀🍒</span>
  </div>
  <div class="corner-decoration bot-left">
    <span class="cherry-emoji">🖤🌸</span>
  </div>
  <div class="corner-decoration bot-right">
    <span class="cherry-emoji">⭐🖤</span>
  </div>

  <!-- =============================================
       CONTENIDO PRINCIPAL
  ============================================= -->
  <main id="app">

    <!-- IMAGEN KUROMI -->
    <div class="kuromi-img-wrapper" id="kuromi-wrapper">
      <!--
        Coloca imagen_kuromi.png en la misma carpeta y descomenta:
        <img src="imagen_kuromi.png" alt="Kuromi de Sanrio">
      -->
      <div class="kuromi-placeholder">🎀</div>
    </div>

    <!-- BADGE ICPC -->
    <div class="badge">🖤 ICPC Team Recruitment 🖤</div>

    <!-- TÍTULO -->
    <h1 class="main-title">
      ¿Quieres ser<br>nuestra coach<br>para el ICPC?
    </h1>

    <!-- SUBTÍTULO / CONTADOR -->
    <p class="subtitle" id="no-counter-msg">
      <!-- Se actualiza con JS -->
    </p>

    <!-- BOTONES PRINCIPALES -->
    <div class="buttons-wrapper" id="buttons-section">
      <button class="btn" id="btn-yes" onclick="onYes()">
        💜 ¡SÍ! 💜
      </button>
      <button class="btn" id="btn-no" onclick="onNo()">
        💀 NO 💀
      </button>
    </div>

    <!-- SEPARADOR DECORATIVO -->
    <div class="deco-divider" id="deco-div">🌸 ★ 🌸</div>

    <!-- PANTALLA DE VICTORIA (oculta al inicio) -->
    <div id="victory-screen">
      <div class="victory-title">🎉 ¡ERES NUESTRA COACH! 🎉</div>
      <p class="victory-sub">
        ¡Kuromi y todo el equipo están súper emocionados de tenerte! 🖤💜<br>
        Prepárate para conquistar el ICPC juntos. ¡Eres la mejor!
      </p>
      <!-- Confeti se lanza por JS -->
    </div>

  </main>

  <footer>
    🖤 Hecho con amor (y algo de magia oscura) por el team ICPC 💜
  </footer>

  <!-- =============================================
       JAVASCRIPT
  ============================================= -->
  <script>
    /* -----------------------------------------------
       CONSTANTES Y ESTADO
    ----------------------------------------------- */
    const STORAGE_KEY   = 'icpc_no_count';
    const YES_MAX_SCALE = 2.0;
    const YES_STEP      = 0.1;
    const NO_MIN_SCALE  = 0.5;
    const NO_STEP       = 0.1;

    let noCount = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);

    /* -----------------------------------------------
       REFERENCIAS AL DOM
    ----------------------------------------------- */
    const btnYes      = document.getElementById('btn-yes');
    const btnNo       = document.getElementById('btn-no');
    const noMsg       = document.getElementById('no-counter-msg');
    const victoryDiv  = document.getElementById('victory-screen');
    const buttonsDiv  = document.getElementById('buttons-section');
    const decoDiv     = document.getElementById('deco-div');
    const confCanvas  = document.getElementById('confetti-canvas');
    const ctx         = confCanvas.getContext('2d');

    /* -----------------------------------------------
       INICIALIZACIÓN
    ----------------------------------------------- */
    function init() {
      applyScales();
      updateMessage();
    }

    /* -----------------------------------------------
       CALCULAR Y APLICAR ESCALAS
    ----------------------------------------------- */
    function applyScales() {
      const yesScale = Math.min(1 + noCount * YES_STEP, YES_MAX_SCALE);
      const noScale  = Math.max(1 - noCount * NO_STEP,  NO_MIN_SCALE);
      btnYes.style.transform = `scale(${yesScale.toFixed(1)})`;
      btnNo.style.transform  = `scale(${noScale.toFixed(1)})`;
    }

    /* -----------------------------------------------
       MENSAJES DINÁMICOS AL DECIR "NO"
    ----------------------------------------------- */
    const noMessages = [
      '¿Segura? Nosotros creemos en ti 🖤',
      '¡Vamos, no seas así! 👀💜',
      'Kuromi dice: ¡Recónsideralo! 🎀',
      '¿De verdad? El equipo te necesita 😤',
      '¡Cada "no" nos da más energía! 💪🖤',
      '¡Ya casi te convences! 😏',
      '¿No te gustan los trofeos? 🏆',
      'El ICPC sin ti no es lo mismo 🌸',
      '¡Última oportunidad! (mentira, seguimos pidiendo) 🍒',
      'Tu corazón sabe la respuesta… 🖤💜',
    ];

    function updateMessage() {
      if (noCount === 0) {
        noMsg.textContent = 'El equipo ICPC necesita a alguien como tú 💜';
        return;
      }
      const idx = Math.min(noCount - 1, noMessages.length - 1);
      noMsg.textContent = noMessages[idx];
    }

    /* -----------------------------------------------
       ACCIÓN: BOTÓN "NO"
    ----------------------------------------------- */
    function onNo() {
      noCount++;
      localStorage.setItem(STORAGE_KEY, noCount);
      applyScales();
      updateMessage();

      // Shake en el botón SÍ
      btnYes.classList.remove('shake');
      // forzar reflow para reiniciar animación
      void btnYes.offsetWidth;
      btnYes.classList.add('shake');
    }

    /* -----------------------------------------------
       ACCIÓN: BOTÓN "¡SÍ!"
    ----------------------------------------------- */
    function onYes() {
      // Desactivar botones
      btnYes.disabled = true;
      btnNo.disabled  = true;

      // Resetear contador guardado
      localStorage.removeItem(STORAGE_KEY);

      // Ocultar sección de botones y deco
      buttonsDiv.style.display  = 'none';
      decoDiv.style.display     = 'none';
      noMsg.style.display       = 'none';

      // Mostrar pantalla de victoria
      victoryDiv.classList.add('active');

      // Lanzar confeti
      launchConfetti();
    }

    /* -----------------------------------------------
       CONFETI — Canvas 2D puro
    ----------------------------------------------- */
    const CONFETTI_COUNT = 180;
    const COLORS = ['#FF69B4','#eea1e3','#9370DB','#514283','#FFFFFF','#FFD700','#FF1493'];

    let pieces = [];
    let animId  = null;

    function initCanvas() {
      confCanvas.width  = window.innerWidth;
      confCanvas.height = window.innerHeight;
    }

    function launchConfetti() {
      initCanvas();
      pieces = [];
      for (let i = 0; i < CONFETTI_COUNT; i++) {
        pieces.push({
          x:      Math.random() * confCanvas.width,
          y:      Math.random() * confCanvas.height - confCanvas.height,
          w:      6 + Math.random() * 8,
          h:      4 + Math.random() * 6,
          color:  COLORS[Math.floor(Math.random() * COLORS.length)],
          speed:  2 + Math.random() * 4,
          angle:  Math.random() * Math.PI * 2,
          spin:   (Math.random() - 0.5) * 0.2,
          drift:  (Math.random() - 0.5) * 1.5,
          life:   1.0,
          decay:  0.003 + Math.random() * 0.003,
          shape:  Math.random() > 0.5 ? 'rect' : 'circle',
        });
      }
      if (animId) cancelAnimationFrame(animId);
      drawConfetti();
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, confCanvas.width, confCanvas.height);
      let alive = false;
      for (const p of pieces) {
        p.y      += p.speed;
        p.x      += p.drift;
        p.angle  += p.spin;
        p.life   -= p.decay;
        if (p.y < confCanvas.height + 20) alive = true;

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        }
        ctx.restore();
      }
      if (alive) {
        animId = requestAnimationFrame(drawConfetti);
      } else {
        ctx.clearRect(0, 0, confCanvas.width, confCanvas.height);
      }
    }

    window.addEventListener('resize', () => {
      if (pieces.length) initCanvas();
    });

    /* -----------------------------------------------
       PARTÍCULAS FLOTANTES DE FONDO
    ----------------------------------------------- */
    const EMOJIS = ['🖤','💜','🌸','⭐','💀','🎀','✨','🍒'];

    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 22; i++) {
        const el       = document.createElement('div');
        el.className   = 'particle';
        el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        el.style.left  = Math.random() * 100 + 'vw';
        el.style.setProperty('--dur',   (7 + Math.random() * 10) + 's');
        el.style.setProperty('--delay', -(Math.random() * 15) + 's');
        el.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
        container.appendChild(el);
      }
    }

    /* -----------------------------------------------
       ARRANQUE
    ----------------------------------------------- */
    createParticles();
    init();
  </script>
</body>
</html>
